<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familie Opskrifter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-one" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-two" aria-hidden="true"></div>

  <header class="hero">
    <p class="kicker">Familie Opskriftsbog</p>
    <h1>Opskrifter samlet ét sted</h1>
    <p class="lead">En visuel samling af familiens opskrifter. Søg eller filtrer, og klik på et kort for at åbne opskriften.</p>
    <div class="hero-actions">
      <a class="cta" href="./index.html">Se opskrifter</a>
      <a class="cta cta-secondary" href="./wheel.html">Prøv madhjulet</a>
    </div>
  </header>

  <main id="recipes" class="content">
    <section class="section-head">
      <h2>Alle opskrifter</h2>
      <p id="resultCount">0 opskrifter</p>
    </section>

    <section class="controls" aria-label="Filtre">
      <label class="control search-wrap">
        <span>Søg</span>
        <input id="searchInput" type="search" placeholder="Søg efter titel eller nummer" autocomplete="off" />
      </label>

      <label class="control filter-wrap">
        <span>Kategori</span>
        <select id="categoryFilter"></select>
      </label>
    </section>

    <section id="recipeGrid" class="grid" aria-live="polite"></section>
    <p id="loadError" class="empty" hidden>Kunne ikke indlæse opskrifter lige nu.</p>
    <p id="emptyState" class="empty" hidden>Ingen opskrifter matcher dine filtre.</p>
  </main>

  <script src="./data/recipes.js"></script>
  <script>
    let recipes = [];

    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const recipeGrid = document.getElementById("recipeGrid");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");
    const loadError = document.getElementById("loadError");

    const categoryLabelMap = {
      dinner: "Dinner",
      desserts: "Desserts",
      cakes: "Cakes",
      uncategorized: "Uncategorized"
    };

    function categoryLabel(category) {
      return categoryLabelMap[category] || category;
    }

    function buildCategoryOptions() {
      const categories = [...new Set(recipes.map((recipe) => recipe.category).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "da"));

      categoryFilter.textContent = "";
      const allOption = document.createElement("option");
      allOption.value = "";
      allOption.textContent = "Alle kategorier";
      categoryFilter.appendChild(allOption);

      categories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = categoryLabel(category);
        categoryFilter.appendChild(option);
      });
    }

    function renderRecipes() {
      const query = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;

      const filtered = recipes.filter((recipe) => {
        const text = `${recipe.title} ${recipe.id}`.toLowerCase();
        const matchQuery = !query || text.includes(query);
        const matchCategory = !category || recipe.category === category;
        return matchQuery && matchCategory;
      });

      recipeGrid.textContent = "";

      filtered.forEach((recipe) => {
        const link = document.createElement("a");
        link.className = "card";
        link.href = `./recipe.html?id=${encodeURIComponent(recipe.id)}`;

        const img = document.createElement("img");
        img.src = recipe.image;
        img.alt = recipe.title;
        img.loading = "lazy";

        const title = document.createElement("span");
        title.textContent = recipe.title;

        const small = document.createElement("small");
        small.textContent = categoryLabel(recipe.category);

        link.appendChild(img);
        link.appendChild(title);
        link.appendChild(small);
        recipeGrid.appendChild(link);
      });

      resultCount.textContent = `${filtered.length} opskrifter`;
      emptyState.hidden = filtered.length > 0;
    }

    async function loadRecipes() {
      if (Array.isArray(window.__RECIPES__)) {
        return window.__RECIPES__;
      }

      const response = await fetch("./data/recipes.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load recipe data (${response.status})`);
      }
      return response.json();
    }

    async function init() {
      try {
        recipes = await loadRecipes();
        loadError.hidden = true;
      } catch (error) {
        console.error(error);
        recipes = [];
        loadError.hidden = false;
      }

      buildCategoryOptions();
      renderRecipes();
    }

    searchInput.addEventListener("input", renderRecipes);
    categoryFilter.addEventListener("change", renderRecipes);
    init();
  </script>
</body>
</html>
